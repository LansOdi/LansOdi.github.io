<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<body class="page-fade content-visible" style="overflow-y: auto;">
    <header id="main-header" class="fixed top-0 left-0 right-0 bg-gradient-to-b from-black/80 to-transparent z-30 flex">
        <nav class="container mx-auto px-6 md:px-10 py-5 flex justify-between items-center">
            <div class="flex items-center gap-8">
                <a href="index.html" id="logo-link" class="text-2xl hulu-logo-font nav-page-link">Lans Odidi</a>
                <div id="nav-links-container" class="hidden md:flex items-center gap-6">
                    <a href="index.html" class="nav-link nav-page-link">Home</a>
                </div>
            </div>
            <div class="flex items-center gap-4 md:gap-6">
                <a href="https://github.com/LansOdi" target="_blank" rel="noopener noreferrer" aria-label="GitHub Profile"><i data-feather="github" class="text-gray-300 hover:text-white transition-colors"></i></a>
                <div class="relative">
                    <button id="profile-dropdown-button" class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-lg focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-hulu-dark focus:ring-white">
                        <div class="w-full h-full flex items-center justify-center"><i data-feather="code" class="w-5 h-5"></i></div>
                    </button>
                    <div id="profile-dropdown-menu" class="hidden opacity-0 transform -translate-y-2 absolute top-full right-0 mt-2 w-60 bg-hulu-gray rounded-md shadow-lg z-40">
                        <div id="dropdown-profiles-container" class="py-2">
                            <a href="recruiter.html" class="change-profile-link nav-page-link flex items-center px-4 py-2 text-sm text-gray-200 hover:bg-gray-700"><span class="w-7 h-7 mr-3 bg-blue-600 rounded-full flex items-center justify-center"><i data-feather="briefcase" class="w-5 h-5"></i></span> Recruiter</a>
                            <a href="stalker.html" class="change-profile-link nav-page-link flex items-center px-4 py-2 text-sm text-gray-200 hover:bg-gray-700"><span class="w-7 h-7 mr-3 bg-purple-600 rounded-full flex items-center justify-center"><i data-feather="eye" class="w-5 h-5"></i></span> Stalker</a>
                            <a href="developer.html" class="change-profile-link nav-page-link flex items-center px-4 py-2 text-sm text-gray-200 hover:bg-gray-700"><span class="w-7 h-7 mr-3 bg-teal-600 rounded-full flex items-center justify-center"><i data-feather="code" class="w-5 h-5"></i></span> Developer</a>
                        </div>
                        <div class="border-t border-gray-600"></div>
                        <div class="py-2"><a href="index.html" class="block px-4 py-2 text-sm text-gray-200 hover:bg-gray-700 nav-page-link">Log Out</a></div>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <div id="developer-view" class="main-content-view visible" style="min-height: 100vh;">
        <div class="h-full flex flex-col items-center justify-center text-center p-8" style="height: 100vh;"><svg class="w-24 h-24 text-hulu-green construction-icon mb-6" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg><h2 class="text-4xl font-extrabold mb-2">Under Construction</h2><p class="text-lg text-gray-400 mb-8">This profile is currently being developed. Please check back later!</p><a href="index.html" class="nav-page-link hero-button hero-button-secondary font-bold py-3 px-6 rounded-md flex items-center gap-2"><i data-feather="arrow-left" class="w-5 h-5"></i> Back to Menu</a></div>
    </div>

    <script>
        feather.replace();
        
        // Fade in on load
        document.addEventListener("DOMContentLoaded", () => {
            document.body.style.opacity = '1';
        });

        // Handle page transitions for links using the page transition effect
        document.querySelectorAll('.nav-page-link, a[href$=".html"]').forEach(link => {
            link.addEventListener('click', (e) => {
                if (link.target === "_blank") return;
                e.preventDefault();
                const target = link.href || link.getAttribute('href');
                document.body.style.opacity = '0';
                setTimeout(() => {
                    window.location.href = target;
                }, 500);
            });
        });

        // Dropdown logic
        const profileDropdownButton = document.getElementById('profile-dropdown-button');
        const profileDropdownMenu = document.getElementById('profile-dropdown-menu');
        
        profileDropdownButton.addEventListener('click', (event) => {
            event.stopPropagation();
            profileDropdownMenu.classList.toggle('hidden');
            profileDropdownMenu.classList.toggle('opacity-0');
            profileDropdownMenu.classList.toggle('-translate-y-2');
        });
        
        window.addEventListener('click', () => { 
            if (!profileDropdownMenu.classList.contains('hidden')) { 
                profileDropdownMenu.classList.add('hidden', 'opacity-0', '-translate-y-2'); 
            } 
        });

        window.addEventListener('pageshow', (event) => {
            if (event.persisted) {
                document.body.style.opacity = '1';
            }
        });
    </script>
</body>
</html>
